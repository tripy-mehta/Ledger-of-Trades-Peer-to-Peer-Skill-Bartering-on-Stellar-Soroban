name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  contracts:
    name: Smart contracts — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build reputation contract (wasm)
        run: cargo build --target wasm32-unknown-unknown --release -p reputation-registry

      - name: Build trade contract (wasm)
        run: cargo build --target wasm32-unknown-unknown --release -p skill-trade

      - name: Run contract tests
        run: cargo test --workspace --verbose

  frontend:
    name: Frontend — lint, test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run frontend tests
        run: npm run test

      - name: Build production bundle
        run: npm run build

  deploy-preview:
    name: Deployment readiness check
    needs: [contracts, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: echo "Contracts and frontend are verified — ready for testnet deployment / Vercel preview."
